<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:#111827;
    color:white;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:32px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    max-width:900px;
    margin:auto;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;

    min-height:90px;
    padding:15px;

    border-radius:18px;

    background:linear-gradient(145deg,#1f2937,#374151);

    color:white;
    text-decoration:none;

    font-size:20px;
    font-weight:bold;

    box-shadow:
        0 4px 10px rgba(0,0,0,0.4),
        inset 0 1px 1px rgba(255,255,255,0.1);

    transition:0.15s;
}

.btn:active{
    transform:scale(0.96);
}

.btn:hover{
    background:linear-gradient(145deg,#374151,#4b5563);
}

@media (max-width:600px){
    .btn{
        min-height:80px;
        font-size:18px;
    }
}
</style>
</head>

<body>

<h1>🎵 Link Board</h1>
